{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Student Registration | Campus Stationery{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0"><i class="bi bi-person-plus"></i> Student Registration</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post" novalidate>
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-circle"></i> Create Account
                            </button>
                        </div>
                    </form>
                    <hr class="my-4">
                    <div class="text-center">
                        <p class="mb-2">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
                        <p class="mb-0">Are you a vendor? <a href="{% url 'register_vendor' %}">Register as Vendor</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
